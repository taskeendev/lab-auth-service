# ทุกค่ามาจาก env เสมอ (ค่าหลัง : คือ default สำหรับ dev เท่านั้น — ห้ามใส่ secret จริงในไฟล์นี้)
server:
  port: ${SERVER_PORT:8081}
  shutdown: graceful   # รอ request ค้างให้จบก่อนดับ — สำคัญตอนอยู่หลัง gateway/k8s

logging:
  pattern:
    console: "%d{HH:mm:ss.SSS} %-5level [%X{requestId:-—}] %logger{24} : %msg%n"

spring:
  application:
    name: auth-service
  datasource:
    url: ${DB_URL}
    username: ${DB_USER}
    password: ${DB_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: validate   # Flyway เป็นเจ้าของ schema — Hibernate มีหน้าที่แค่ตรวจว่า entity ตรงกับตารางจริง

jwt:
  secret: ${JWT_SECRET}            # ≥ 32 ไบต์ — ห้ามมี default: ลืมตั้งต้องพังตอน boot ไม่ใช่หลุดไปใช้ค่าอ่อนแอ
  ttl-minutes: ${JWT_TTL_MINUTES:15}

app:
  admin-email: ${ADMIN_EMAIL:}   # อีเมลที่ register แล้วได้ ADMIN — เว้นว่าง = ปิดกลไก bootstrap
