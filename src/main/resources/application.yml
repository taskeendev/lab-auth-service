# ทุกค่ามาจาก env เสมอ (ค่าหลัง : คือ default สำหรับ dev เท่านั้น — ห้ามใส่ secret จริงในไฟล์นี้)
server:
  port: ${SERVER_PORT:8081}

spring:
  application:
    name: auth-service
  datasource:
    url: ${DB_URL}
    username: ${DB_USER}
    password: ${DB_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: validate   # Flyway เป็นเจ้าของ schema — Hibernate มีหน้าที่แค่ตรวจว่า entity ตรงกับตารางจริง
