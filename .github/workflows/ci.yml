name: ci

on:
  push:
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read   # ดึง lab-common จาก GitHub Packages
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
      - name: probe lab-common package access (diagnostic, ลบทีหลัง)
        env:
          TOK: ${{ secrets.GITHUB_TOKEN }}
        run: |
          code=$(curl -s -o /dev/null -w '%{http_code}' -u "x:$TOK" \
            https://maven.pkg.github.com/taskeendev/lab-common/lab/lab-common/0.1.0/lab-common-0.1.0.pom)
          echo "PROBE: GITHUB_TOKEN read lab-common pom -> HTTP $code"
      - name: build + tests (รวม integration กับ Postgres จริงผ่าน Testcontainers)
        run: ./gradlew build --no-daemon
        env:
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
