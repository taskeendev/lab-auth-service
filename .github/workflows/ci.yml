name: ci

on:
  push:
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
      - name: build + tests (รวม integration กับ Postgres จริงผ่าน Testcontainers)
        run: ./gradlew build --no-daemon
